name: Generated Smoke

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  generated-image-smoke:
    name: Generated image backend and frontend smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux image dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libgl1 libglib2.0-0

      - name: Install Python package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Compile Python sources
        run: python -m compileall -q src tests scripts

      - name: Run generated-image backend smoke
        run: python scripts/smoke_generated_images.py

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Typecheck frontend
        run: npm --prefix frontend run typecheck

      - name: Build frontend
        run: npm --prefix frontend run build
