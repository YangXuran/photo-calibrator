<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Photo Calibrator</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark"></span>
          <span>Photo Calibrator</span>
        </div>
        <div class="toolbar">
          <label class="button">
            <input id="folderInput" data-testid="folder-input" type="file" accept="image/*,.tif,.tiff,.dng,.cr2,.cr3,.nef,.arw,.raf,.rw2,.orf,.pef,.srw" multiple webkitdirectory />
            打开文件夹
          </label>
          <label class="button secondary">
            <input id="fileInput" data-testid="file-input" type="file" accept="image/*,.tif,.tiff,.dng,.cr2,.cr3,.nef,.arw,.raf,.rw2,.orf,.pef,.srw" multiple />
            添加照片
          </label>
        </div>
      </header>

      <main class="workspace">
        <section class="viewer" aria-label="照片预览">
          <div id="emptyState" class="empty-state" data-testid="empty-state">
            <strong>加载照片开始检查校准效果</strong>
            <span>选择文件夹后，底栏会显示该文件夹中的照片缩略图。</span>
          </div>
          <div id="imageGrid" class="image-grid hidden" data-testid="image-grid">
            <figure>
              <figcaption>原图</figcaption>
              <img id="originalImage" data-testid="original-image" alt="原图预览" />
            </figure>
            <figure>
              <figcaption>校准预览</figcaption>
              <img id="calibratedImage" data-testid="calibrated-image" alt="校准预览" />
            </figure>
          </div>
        </section>

        <aside class="inspector" aria-label="算法检查">
          <div class="file-title" id="fileTitle" data-testid="file-title">未选择照片</div>
          <div class="controls">
            <label>
              模式
              <select id="modeSelect" data-testid="mode-select">
                <option value="global">全局校准</option>
                <option value="midtones-only">中间调</option>
                <option value="skin-priority">肤色优先</option>
                <option value="highlights-only">高光去偏</option>
                <option value="preserve-split-tone">保留分离色调</option>
                <option value="rgb-curves">RGB 曲线</option>
                <option value="tone-zone">分区校正</option>
                <option value="matrix">3x3 矩阵</option>
                <option value="lut3d">3D LUT</option>
                <option value="selective">选择性色彩</option>
                <option value="film">胶片校准</option>
              </select>
            </label>
            <label>
              强度 <span id="strengthValue">0.80</span>
              <input id="strengthInput" data-testid="strength-input" type="range" min="0" max="1.2" step="0.05" value="0.8" />
            </label>
            <label>
              加速后端
              <select id="acceleratorSelect" data-testid="accelerator-select">
                <option value="auto">自动</option>
                <option value="cpu-opencv">CPU OpenCV</option>
                <option value="opencl-umat">OpenCL UMat</option>
                <option value="torch">Torch 自动</option>
                <option value="torch-cuda">Torch CUDA</option>
                <option value="torch-mps">Torch MPS</option>
                <option value="metal-mps">Metal MPS</option>
              </select>
            </label>
          </div>

          <div class="metric-grid">
            <div class="metric">
              <span>原图 |dE|</span>
              <strong id="beforeStrength" data-testid="before-strength">-</strong>
            </div>
            <div class="metric">
              <span>校准后 |dE|</span>
              <strong id="afterStrength" data-testid="after-strength">-</strong>
            </div>
            <div class="metric">
              <span>削减率</span>
              <strong id="reduction" data-testid="reduction">-</strong>
            </div>
            <div class="metric">
              <span>方向</span>
              <strong id="direction" data-testid="direction">-</strong>
            </div>
            <div class="metric">
              <span>分析尺寸</span>
              <strong id="analysisSize" data-testid="analysis-size">-</strong>
            </div>
            <div class="metric">
              <span>估计来源</span>
              <strong id="castSource" data-testid="cast-source">-</strong>
            </div>
            <div class="metric">
              <span>预览来源</span>
              <strong id="previewSource" data-testid="preview-source">-</strong>
            </div>
            <div class="metric">
              <span>加速后端</span>
              <strong id="acceleratorBackend" data-testid="accelerator-backend">-</strong>
            </div>
            <div class="metric">
              <span>3D LUT 路径</span>
              <strong id="lutPath" data-testid="lut-path">-</strong>
            </div>
            <div class="metric">
              <span>CCC Dσ</span>
              <strong id="cccValue" data-testid="ccc-value">-</strong>
            </div>
            <div class="metric">
              <span>PCI</span>
              <strong id="pciValue" data-testid="pci-value">-</strong>
            </div>
          </div>

          <div class="accelerator-card" data-testid="accelerator-card">
            <div class="accelerator-card-header">
              <span>加速状态</span>
              <button id="benchmarkButton" class="mini-button" type="button" data-testid="benchmark-button">基准测试</button>
            </div>
            <div class="accelerator-grid">
              <div><span>请求</span><strong id="acceleratorRequested" data-testid="accelerator-requested">-</strong></div>
              <div><span>OpenCL</span><strong id="openclStatus" data-testid="opencl-status">-</strong></div>
              <div><span>GPU 路径</span><strong id="acceleratedOps" data-testid="accelerated-ops">-</strong></div>
              <div><span>CPU 回退</span><strong id="fallbackOps" data-testid="fallback-ops">-</strong></div>
            </div>
            <div id="fallbackReason" class="fallback-reason" data-testid="fallback-reason">-</div>
            <table class="benchmark-table">
              <thead>
                <tr><th>算子</th><th>设备</th><th>路径</th><th>ms</th></tr>
              </thead>
              <tbody id="benchmarkRows" data-testid="benchmark-rows"></tbody>
            </table>
          </div>

          <div class="zone-table">
            <div class="zone-header">亮度分区</div>
            <table>
              <thead>
                <tr><th>区域</th><th>a*</th><th>b*</th><th>像素</th></tr>
              </thead>
              <tbody id="zoneRows" data-testid="zone-rows"></tbody>
            </table>
          </div>

          <div class="skin-card" data-testid="skin-card">
            <div class="skin-card-header">肤色检测</div>
            <div id="skinStatus" class="skin-status" data-testid="skin-status">未检测</div>
            <div class="skin-grid">
              <div><span>像素</span><strong id="skinPixels" data-testid="skin-pixels">-</strong></div>
              <div><span>a*</span><strong id="skinA" data-testid="skin-a">-</strong></div>
              <div><span>b*</span><strong id="skinB" data-testid="skin-b">-</strong></div>
              <div><span>相对全图</span><strong id="skinDelta" data-testid="skin-delta">-</strong></div>
            </div>
          </div>

          <div class="charts" data-testid="charts-panel">
            <section class="chart-card">
              <div class="chart-title">RGB 直方图</div>
              <canvas id="rgbHistogram" data-testid="rgb-histogram" width="300" height="150"></canvas>
            </section>
            <section class="chart-card">
              <div class="chart-title">Lab a/b 向量</div>
              <canvas id="labVector" data-testid="lab-vector" width="300" height="180"></canvas>
            </section>
            <section class="chart-card">
              <div class="chart-title">校准强度</div>
              <canvas id="strengthChart" data-testid="strength-chart" width="300" height="130"></canvas>
            </section>
            <section class="chart-card">
              <div class="chart-title">分区偏色</div>
              <canvas id="zoneChart" data-testid="zone-chart" width="300" height="150"></canvas>
            </section>
          </div>
        </aside>
      </main>

      <footer class="filmstrip-shell">
        <div class="filmstrip-meta">
          <span id="folderLabel" data-testid="folder-label">未加载文件夹</span>
          <span id="countLabel">0 张</span>
        </div>
        <div id="filmstrip" class="filmstrip" data-testid="filmstrip"></div>
      </footer>
    </div>
    <script src="/app.js"></script>
  </body>
</html>
